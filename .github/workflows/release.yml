name: Patch and Publish Aspire Extension

on:
  schedule:
    - cron: '0 0 * * *' # Checks daily at midnight
  workflow_dispatch:   # Allows you to run it manually

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Wrapper Repo
        uses: actions/checkout@v4

      - name: Clone Microsoft Aspire Repo
        run: |
          # We use a sparse checkout to only get the extension directory
          git clone --filter=blob:none --sparse https://github.com/microsoft/aspire.git upstream
          cd upstream
          git sparse-checkout set extension
          cd ..

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # cache: 'npm'
          # cache-dependency-path: 'upstream/extension/package-lock.json'

      - name: Apply Patches
        run: |
          # 1. Apply git patch
          git apply --directory=upstream aspire-changes.patch
          
          cd upstream/extension

          # 2. Update README.md with warning
          sed -i 's/official/unofficial/g' README.md
          sed -i '1i THIS IS NOT THE OFFICIAL ASPIRE EXTENSION. ANY ISSUES SHOULD NOT BE SENT TO THE ASPIRE GITHUB PAGE.\n\nThis extension allows the muhammad-sammy.csharp extension to work for debugging Aspire projects.\n' README.md
          
          # 3. Update Publisher to "joshmann"
          # We use jq for clean JSON manipulation
          jq '.publisher = "joshmann" | .version + "-patch"' package.json > temp.json && mv temp.json package.json
          jq '.version + "-patch"' package-lock.json > temp.json && mv temp.json package-lock.json
          jq '.["extension.description"] = "Unofficial Aspire extension for VSCode forks supporting the muhammad-sammy.csharp extension"' package.nls.json > temp.json && mv temp.json package.nls.json
          
          echo "Patches applied successfully."

      - name: Install Dependencies and Build
        run: |
          cd upstream/extension
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --force --legacy-peer-deps
          # The Aspire extension uses 'vsce package' to build the .vsix
          npx @vscode/vsce package

      - name: Publish to Open VSX
        run: |
          cd upstream/extension
          # This finds the generated .vsix and pushes it
          npx ovsx publish $(ls *.vsix) -p ${{ secrets.OPEN_VSX_TOKEN }}
